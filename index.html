<style>
  :root{
    --bg:#e7e9ee;
    --surface:#ffffff;
    --ink:#15171f;
    --muted:#646b7c;
    --faint:#9aa1b1;
    --line:#dde0e8;
    --gain:#0c7a4a;
    --gain-soft:#e4f3eb;
    --amber:#9a6a05;
    --amber-soft:#f7eed7;
    --shadow:0 1px 2px rgba(20,23,31,.05),0 8px 24px -16px rgba(20,23,31,.25);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:"Noto Sans TC",system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    padding-bottom:60px;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:0 16px}

  /* ---------- HERO (minimal) ---------- */
  header.hero{
    padding:28px 0 18px;
    border-bottom:1px solid var(--line);
  }
  .title-row{display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap}
  .yr{
    font-family:"Space Grotesk",sans-serif;font-weight:700;
    font-size:clamp(56px,16vw,104px);line-height:.82;
    letter-spacing:-.03em;color:var(--ink);
  }
  .yr .dot{color:var(--gain)}
  h1{
    font-family:"Noto Sans TC",sans-serif;font-weight:900;
    font-size:clamp(22px,5.4vw,34px);letter-spacing:.01em;
    padding-bottom:8px;
  }

  /* ---------- CARD MULTI-SELECTOR ---------- */
  .selector{
    background:var(--surface);
    border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;margin:18px 0 6px;
    box-shadow:var(--shadow);
  }
  .sel-head{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:11px;flex-wrap:wrap;gap:8px;
  }
  .sel-title{
    font-size:12px;font-weight:700;color:var(--muted);
    letter-spacing:.2em;text-transform:uppercase;
    font-family:"JetBrains Mono",monospace;
  }
  .sel-actions{display:flex;gap:6px}
  .sel-btn{
    cursor:pointer;font-size:11.5px;font-weight:600;color:var(--muted);
    background:transparent;border:1px solid var(--line);
    padding:4px 10px;border-radius:6px;transition:.15s;
  }
  .sel-btn:hover{border-color:var(--ink);color:var(--ink)}
  .sel-grid{display:flex;flex-wrap:wrap;gap:6px}
  .sel-pill{
    cursor:pointer;user-select:none;
    font-size:12.5px;font-weight:500;
    padding:6px 11px;border-radius:8px;
    border:1px solid var(--line);background:#f6f7fa;
    color:var(--muted);transition:.12s;
    display:inline-flex;align-items:center;gap:5px;
  }
  .sel-pill .dot{
    width:8px;height:8px;border-radius:50%;background:#d0d3dc;flex:0 0 auto;
  }
  .sel-pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .sel-pill.on .dot{background:#7ce0a8}

  /* ---------- SCENARIO FILTER ---------- */
  .filter{
    position:sticky;top:0;z-index:20;
    background:rgba(231,233,238,.88);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    padding:12px 0;margin-top:10px;
  }
  .filter-inner{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px;scrollbar-width:none}
  .filter-inner::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;cursor:pointer;border:1px solid var(--line);
    background:var(--surface);color:var(--muted);
    padding:7px 14px;border-radius:999px;font-size:13px;font-weight:500;
    white-space:nowrap;transition:.18s;user-select:none;
  }
  .chip:hover{border-color:var(--ink);color:var(--ink)}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* ---------- GRID ---------- */
  .grid{
    display:grid;gap:16px;padding:26px 0 0;
    grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  }
  @media(max-width:560px){.grid{grid-template-columns:1fr;gap:14px}}

  .card{
    position:relative;background:var(--surface);border-radius:16px;
    box-shadow:var(--shadow);overflow:hidden;
    border:1px solid var(--line);
    transition:opacity .25s, transform .25s, box-shadow .25s;
    display:flex;flex-direction:column;
  }
  .card .rail{height:5px;width:100%}
  .card-body{padding:18px 18px 16px;display:flex;flex-direction:column;gap:11px;flex:1}

  .tags{display:flex;flex-wrap:wrap;gap:6px}
  .tag{
    font-size:10.5px;font-weight:700;letter-spacing:.04em;
    background:#f1f2f6;color:var(--muted);
    padding:3px 8px;border-radius:6px;text-transform:uppercase;
    font-family:"JetBrains Mono",monospace;
  }
  .tag.jp{background:#fbe9e9;color:#b5322f}
  .tag.kr{background:#ece4f7;color:#6534a5}
  .tag.eu{background:#dfeaf7;color:#1e5fa3}

  .head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .name-block .name{font-weight:900;font-size:19px;letter-spacing:.01em;line-height:1.25}
  .name-block .issuer{font-size:12px;color:var(--faint);margin-top:2px}
  .valid{
    flex:0 0 auto;text-align:right;
    font-family:"JetBrains Mono",monospace;font-size:10.5px;
    color:var(--muted);line-height:1.4;
  }
  .valid span{display:block;color:var(--faint);font-size:9px;letter-spacing:.1em}

  .pts{
    display:inline-flex;align-self:flex-start;align-items:center;gap:5px;
    font-size:11px;color:var(--muted);
    background:#f6f7fa;border:1px solid var(--line);
    padding:3px 9px;border-radius:7px;
  }
  .pts b{color:var(--ink);font-weight:700}

  /* scheme block for multi-scheme cards */
  .scheme{
    border-left:3px solid var(--line);padding:2px 0 2px 11px;
  }
  .scheme.hi{border-left-color:var(--gain)}
  .scheme-name{
    font-size:11px;font-weight:700;color:var(--muted);
    letter-spacing:.06em;text-transform:uppercase;
    font-family:"JetBrains Mono",monospace;
  }
  .scheme.hi .scheme-name{color:var(--gain)}

  /* tier ladder */
  .tiers{display:flex;flex-direction:column;gap:8px;margin-top:2px}
  .tier{display:flex;gap:12px;align-items:baseline}
  .rate{
    flex:0 0 64px;text-align:right;
    font-family:"JetBrains Mono",monospace;font-weight:700;
    font-size:20px;letter-spacing:-.02em;color:var(--ink);
    line-height:1;
  }
  .rate.hi{color:var(--gain)}
  .rate small{font-size:11px;font-weight:500;color:var(--faint)}
  .tier-info{flex:1;min-width:0}
  .tier-label{font-size:13px;font-weight:500;color:var(--ink);line-height:1.4}
  .tier-sub{font-size:11.5px;color:var(--muted);margin-top:1px;line-height:1.4}
  .cap{
    display:inline-block;margin-top:3px;
    font-family:"JetBrains Mono",monospace;font-size:10.5px;
    background:var(--gain-soft);color:var(--gain);
    padding:2px 7px;border-radius:5px;font-weight:700;
  }
  .cap.none{background:#eef0f4;color:var(--muted)}

  .note{
    font-size:12px;color:var(--muted);line-height:1.5;
    border-top:1px dashed var(--line);padding-top:10px;
  }
  .alert{
    display:flex;gap:8px;font-size:12px;line-height:1.5;
    background:var(--amber-soft);color:#6b4a02;
    border-radius:9px;padding:9px 11px;
  }
  .alert b{color:var(--amber)}
  .alert .ic{flex:0 0 auto;font-weight:700}

  .footer-link{
    margin-top:auto;display:flex;align-items:center;justify-content:space-between;gap:8px;
    border-top:1px solid var(--line);padding-top:10px;
  }
  .official{
    font-size:11.5px;font-weight:600;color:var(--gain);
    text-decoration:none;display:inline-flex;align-items:center;gap:5px;
    transition:.15s;
  }
  .official:hover{color:#085a37;text-decoration:underline}
  .official .arrow{font-size:13px;transition:transform .15s}
  .official:hover .arrow{transform:translateX(2px)}

  .empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:60px 0;font-size:14px}
</style>
</head>

<header class="hero">

<main class="wrap">

const scenarios = ["全部","無腦日常","網購","行動支付","影音訂閱","美食外送","旅遊機票","旅日","旅韓","旅歐美","售票電玩","好市多加油","悠遊卡加值","停車","保費"];
let activeScenario = "全部";
let visibleCards = new Set(cards.map(c=>c.id));

const selGrid = document.getElementById('selGrid');
const chipBox = document.getElementById('chips');
const grid = document.getElementById('grid');

function renderSelector(){
  selGrid.innerHTML = "";
  cards.forEach(c=>{
    const pill = document.createElement('div');
    pill.className = "sel-pill"+(visibleCards.has(c.id)?" on":"");
    pill.innerHTML = `<span class="dot"></span>${c.name.replace(/^[^\s]+\s/,'')}`;
    pill.onclick = ()=>{
      if(visibleCards.has(c.id)) visibleCards.delete(c.id);
      else visibleCards.add(c.id);
      renderSelector();
      renderGrid();
    };
    selGrid.appendChild(pill);
  });
}

function selectAll(state){
  visibleCards = new Set(state ? cards.map(c=>c.id) : []);
  renderSelector();
  renderGrid();
}

function rateSuffix(r){
  return /^\+?[0-9.]+$/.test(r) ? '%' : '';
}

function renderTier(t){
  return `
    <div class="tier">
      <div class="rate ${t.hi?'hi':''}">${t.rate}<small>${rateSuffix(t.rate)}</small></div>
      <div class="tier-info">
        <div class="tier-label">${t.label}</div>
        ${t.sub?`<div class="tier-sub">${t.sub}</div>`:''}
        ${t.cap?`<span class="cap ${t.cap==='無上限'?'none':''}">${t.cap}</span>`:''}
      </div>
    </div>`;
}

function renderGrid(){
  grid.innerHTML = "";
  let shown = 0;
  cards.forEach(c=>{
    if(!visibleCards.has(c.id)) return;
    if(activeScenario!=="全部" && !c.tags.includes(activeScenario)) return;
    shown++;
    const el = document.createElement('article');
    el.className = "card";
    const tagsHtml = c.tags.map(t=>{
      let cls = "tag";
      if(t==="旅日") cls += " jp";
      else if(t==="旅韓") cls += " kr";
      else if(t==="旅歐美") cls += " eu";
      return `<span class="${cls}">${t}</span>`;
    }).join("");

    let body = "";
    if(c.schemes){
      body = c.schemes.map(s=>`
        <div class="scheme ${s.hi?'hi':''}">
          <div class="scheme-name">${s.name}</div>
          <div class="tiers">${s.tiers.map(renderTier).join('')}</div>
        </div>
      `).join("");
    } else {
      body = `<div class="tiers">${c.tiers.map(renderTier).join('')}</div>`;
    }

    el.innerHTML = `
      <div class="rail" style="background:${c.rail}"></div>
      <div class="card-body">
        <div class="tags">${tagsHtml}</div>
        <div class="head">
          <div class="name-block">
            <div class="name">${c.name}</div>
            <div class="issuer">${c.issuer}</div>
          </div>
          <div class="valid"><span>適用期間</span>${c.valid}</div>
        </div>
        <span class="pts">點數 · <b>${c.pts}</b></span>
        ${body}
        ${c.alert?`<div class="alert"><span class="ic">⚠</span><span><b>留意：</b>${c.alert}</span></div>`:''}
        ${c.note?`<div class="note">${c.note}</div>`:''}
        <div class="footer-link">
          <span style="font-size:11px;color:var(--faint);font-family:'JetBrains Mono',monospace">OFFICIAL</span>
          <a class="official" href="${c.url}" target="_blank" rel="noopener">查看官方公告 <span class="arrow">→</span></a>
        </div>
      </div>`;
    grid.appendChild(el);
  });
  if(shown===0) grid.innerHTML = `<div class="empty">此組合下無對應卡片，請調整篩選</div>`;
}

scenarios.forEach(s=>{
  const ch = document.createElement('div');
  ch.className = "chip"+(s==="全部"?" active":"");
  ch.textContent = s;
  ch.onclick = ()=>{
    activeScenario = s;
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
    ch.classList.add('active');
    renderGrid();
  };
  chipBox.appendChild(ch);
});

renderSelector();
renderGrid();
</script>
